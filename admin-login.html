<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>بوابة المشرفين | PharmReady-AlmaghwryBy-Fadel</title>
  <!-- Google Fonts: Cairo -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Top Utilities bar -->
  <div class="app-container" style="max-width: 1200px; padding: 20px 20px 0; display: flex; justify-content: flex-end; gap: 10px;">
    <button class="theme-switch-btn" id="btn-theme" title="تبديل المظهر / Toggle Theme"><i class="fa-solid fa-moon"></i></button>
    <button class="lang-switch-btn" id="btn-lang" title="Toggle Language / تبديل اللغة"><i class="fa-solid fa-globe"></i></button>
  </div>

  <div class="app-container">
    <div class="auth-wrapper">
      
      <!-- Brand Header -->
      <div class="auth-header">
        <div class="logo-placeholder" style="background: linear-gradient(135deg, var(--color-gold), #fff); margin: 0 auto 20px;">M</div>
        <h2 data-i18n="admin_title">صيدليات آل مغاوري</h2>
        <p data-i18n="admin_subtitle">بوابة الدخول المخصصة للمدير والمطور</p>
      </div>

      <!-- Login Form Card -->
      <div class="card">
        <form id="admin-login-form">
          <div class="form-group" style="margin-bottom: 20px;">
            <label for="admin-password" data-i18n="admin_pass_label">رمز المرور السري للمسؤول <span class="required">*</span></label>
            <div style="position: relative;">
              <input type="password" id="admin-password" required placeholder="••••••••" style="padding-right: 40px; padding-left: 15px;">
              <i class="fa-solid fa-key" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted);"></i>
            </div>
          </div>

          <button type="submit" class="btn btn-gold" style="width: 100%; padding: 14px;">
            <i class="fa-solid fa-unlock-keyhole"></i> <span data-i18n="admin_btn_login">تسجيل الدخول للمستودع</span>
          </button>
        </form>
      </div>

      <!-- Footer option to go back to student login -->
      <div class="auth-footer">
        <a href="index.html" style="font-size: 13px;"><i class="fa-solid fa-arrow-right"></i> <span data-i18n="admin_back">العودة لبوابة المتدربين</span></a>
      </div>

    </div>
  </div>

  <footer class="app-footer">
    <p data-i18n="footer_text">برمجة وتطوير د. أحمد فاضل © 2026 | جميع الحقوق محفوظة لصيدليات آل مغاوري</p>
    <p style="font-size: 10px; margin-top: 5px; color: rgba(128,128,128,0.4)">Support: 01107118948</p>
  </footer>

  <!-- Scripts -->
  <script src="config.js"></script>
  <script>
    // Internationalization (AR/EN) Dictionary
    const langData = {
      ar: {
        admin_title: "صيدليات آل مغاوري",
        admin_subtitle: "بوابة الدخول المخصصة للمدير والمطور",
        admin_pass_label: "رمز المرور السري للمسؤول",
        admin_btn_login: "فتح لوحة الإدارة",
        admin_back: "العودة لبوابة المتدربين",
        footer_text: "برمجة وتطوير د. أحمد فاضل © 2026 | جميع الحقوق محفوظة لصيدليات آل مغاوري",
        login_success: "👑 مرحباً بك يا دكتور أحمد فاضل. تم التحقق من الهوية.",
        login_fail: "رمز المرور غير صحيح!",
        connection_error: "حدث خطأ أثناء محاولة الاتصال بالخادم."
      },
      en: {
        admin_title: "El-Maghawry Pharmacies",
        admin_subtitle: "Developer & CEO Dedicated Entrance",
        admin_pass_label: "Administrator Secret Password",
        admin_btn_login: "Unlock Admin Panel",
        admin_back: "Return to Trainee Gate",
        footer_text: "Engineered by Dr. Ahmed Fadel © 2026 | El-Maghawry Pharmacies Group",
        login_success: "👑 Welcome back, Dr. Ahmed Fadel. Credentials verified.",
        login_fail: "Invalid passcode!",
        connection_error: "Error connecting to database server."
      }
    };

    let currentLang = localStorage.getItem("app_lang") || "ar";
    let currentTheme = localStorage.getItem("app_theme") || "sand"; // sand, green, dark

    // Set layout based on theme & language
    function applySettings() {
      // Theme cycling
      document.body.classList.remove("green-theme", "dark-theme");
      if (currentTheme === "green") {
        document.body.classList.add("green-theme");
        document.getElementById("btn-theme").innerHTML = `<i class="fa-solid fa-leaf" style="color: var(--color-primary);"></i>`;
      } else if (currentTheme === "dark") {
        document.body.classList.add("dark-theme");
        document.getElementById("btn-theme").innerHTML = `<i class="fa-solid fa-sun" style="color: var(--color-gold);"></i>`;
      } else { // sand
        document.getElementById("btn-theme").innerHTML = `<i class="fa-solid fa-moon"></i>`;
      }

      // Apply language translation
      document.documentElement.lang = currentLang;
      document.body.dir = currentLang === "ar" ? "rtl" : "ltr";
      
      // Update inputs layout direction if LTR
      const passwordInput = document.getElementById("admin-password");
      const icon = passwordInput.nextElementSibling;
      if (currentLang === "ltr") {
        passwordInput.style.paddingLeft = "40px";
        passwordInput.style.paddingRight = "15px";
        icon.style.right = "auto";
        icon.style.left = "15px";
      } else {
        passwordInput.style.paddingRight = "40px";
        passwordInput.style.paddingLeft = "15px";
        icon.style.left = "auto";
        icon.style.right = "15px";
      }

      // Update translated texts
      document.querySelectorAll("[data-i18n]").forEach(el => {
        const key = el.getAttribute("data-i18n");
        if (langData[currentLang][key]) {
          el.textContent = langData[currentLang][key];
        }
      });
    }

    // Toggle theme action
    document.getElementById("btn-theme").addEventListener("click", () => {
      if (currentTheme === "sand") {
        currentTheme = "green";
      } else if (currentTheme === "green") {
        currentTheme = "dark";
      } else {
        currentTheme = "sand";
      }
      localStorage.setItem("app_theme", currentTheme);
      applySettings();
    });

    // Toggle language action
    document.getElementById("btn-lang").addEventListener("click", () => {
      currentLang = currentLang === "ar" ? "en" : "ar";
      localStorage.setItem("app_lang", currentLang);
      applySettings();
    });

    // Initial load apply
    applySettings();

    // Form Submission
    document.getElementById("admin-login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const password = document.getElementById("admin-password").value.trim().toLowerCase();

      const btnSubmit = e.target.querySelector("button[type='submit']");
      const originalText = btnSubmit.innerHTML;
      btnSubmit.disabled = true;
      btnSubmit.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i> Loading...`;

      try {
        const response = await apiRequest({
          action: "adminLogin",
          password: password
        });

        if (response.success) {
          sessionStorage.setItem("admin_logged_in", "true");
          sessionStorage.setItem("admin_password", password);

          showToast(langData[currentLang].login_success, "success");
          setTimeout(() => {
            window.location.href = "admin.html";
          }, 1500);
        } else {
          showToast(langData[currentLang].login_fail, "error");
        }
      } catch (err) {
        showToast(langData[currentLang].connection_error, "error");
      } finally {
        btnSubmit.disabled = false;
        btnSubmit.innerHTML = originalText;
      }
    });
  </script>
</body>
</html>
